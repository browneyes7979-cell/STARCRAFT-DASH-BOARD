<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>스타 대시보드</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body {
  font-family: Arial;
  padding: 15px;
  background: #f5f5f5;
}
button {
  padding: 10px;
  margin: 5px 0;
}
.card {
  background: white;
  padding: 10px;
  margin: 10px 0;
  border-radius: 10px;
}
select {
  padding: 5px;
  margin: 3px;
}
</style>
</head>

<body>

<h2>🔥 스타 대시보드</h2>

<!-- 경기 입력 -->
<h3>경기 입력</h3>

A팀<br>
<select id="playerA1"></select>
<select id="playerA2"></select>

<br><br>

B팀<br>
<select id="playerB1"></select>
<select id="playerB2"></select>

<br><br>

승리팀<br>
<select id="winner">
  <option value="A">A팀</option>
  <option value="B">B팀</option>
</select>

<br><br>

<button onclick="saveGame()">경기 저장</button>

<hr>

<!-- 선수 추가 -->
<h3>선수 추가</h3>
<input id="newPlayer" placeholder="이름 입력">
<button onclick="addPlayer()">추가</button>

<hr>

<!-- 랭킹 -->
<h3>🏆 랭킹</h3>
<div id="dashboard"></div>

<hr>

<!-- 최근 경기 -->
<h3>📅 최근 경기</h3>
<div id="recent"></div>


<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

<script>

const firebaseConfig = {
  apiKey: "AIzaSyDKvEB_SrvDSADbqxX0LTgejksxtLt4G6U",
  authDomain: "starcraft-dashboard.firebaseapp.com",
  databaseURL: "https://starcraft-dashboard-default-rtdb.firebaseio.com/",
  projectId: "starcraft-dashboard",
  storageBucket: "starcraft-dashboard.firebasestorage.app",
  messagingSenderId: "153513214633",
  appId: "1:153513214633:web:2fa14175883c4634131fb8"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();


// 🔥 선수 목록
let players = ["상필","홍길동","김철수","이영희"];

// 🔥 셀렉트 채우기
function updateSelects() {
  ["playerA1","playerA2","playerB1","playerB2"].forEach(id => {
    let el = document.getElementById(id);
    el.innerHTML = "";
    players.forEach(p => {
      el.innerHTML += `<option>${p}</option>`;
    });
  });
}
updateSelects();


// 🔥 선수 추가
function addPlayer() {
  let name = document.getElementById("newPlayer").value;
  if (!name) return;

  players.push(name);
  updateSelects();
  document.getElementById("newPlayer").value = "";
}


// 🔥 경기 저장
function saveGame() {

  const game = {
    date: new Date().toLocaleDateString(),
    games: [
      {
        teams: {
          A: [
            document.getElementById("playerA1").value,
            document.getElementById("playerA2").value
          ],
          B: [
            document.getElementById("playerB1").value,
            document.getElementById("playerB2").value
          ]
        },
        winner: document.getElementById("winner").value
      }
    ]
  };

  db.ref("games").push(game);
}


// 🔥 데이터 불러오기
db.ref("games").on("value", snapshot => {

  let data = [];
  let recent = [];

  snapshot.forEach(child => {
    let val = child.val();
    val.key = child.key;
    data.push(val);
    recent.push(val);
  });

  const stats = buildStats(data);
  renderDashboard(stats);
  renderRecent(recent);
});


// 🔥 통계
function buildStats(data) {

  let stats = {};

  data.forEach(match => {

    match.games.forEach(g => {

      const winner = g.winner;

      Object.keys(g.teams).forEach(team => {

        g.teams[team].forEach(name => {

          if (!stats[name]) stats[name] = {win:0, lose:0};

          if (team === winner) stats[name].win++;
          else stats[name].lose++;
        });
      });
    });
  });

  return stats;
}


// 🔥 랭킹 출력
function renderDashboard(stats) {

  let arr = Object.keys(stats).map(name => {

    let s = stats[name];
    let total = s.win + s.lose;
    let rate = total ? s.win / total : 0;

    return { name, win: s.win, lose: s.lose, rate };
  });

  arr.sort((a,b)=>b.rate - a.rate);

  let html = "";

  arr.forEach((p, idx) => {
    html += `
      <div class="card">
        ${idx+1}위 - ${p.name}<br>
        ${p.win}승 ${p.lose}패 (${(p.rate*100).toFixed(1)}%)
      </div>
    `;
  });

  document.getElementById("dashboard").innerHTML = html;
}


// 🔥 최근 경기 + 삭제
function renderRecent(list) {

  list.reverse();

  let html = "";

  list.forEach(g => {

    let game = g.games[0];

    html += `
      <div class="card">
        ${g.date}<br>
        ${game.teams.A.join(", ")} vs ${game.teams.B.join(", ")}<br>
        승리: ${game.winner}
        <br>
        <button onclick="deleteGame('${g.key}')">삭제</button>
      </div>
    `;
  });

  document.getElementById("recent").innerHTML = html;
}


// 🔥 삭제 기능
function deleteGame(key) {
  db.ref("games/" + key).remove();
}

</script>

</body>
</html>
