<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>스타 대시보드</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body { margin:0; font-family:Arial; background:#f2f2f2; }
.tabs { display:flex; background:#222; }
.tabs button {
  flex:1; padding:12px; color:white; border:none; background:#222;
}
.tabs button.active { background:#ff6600; }
.page { display:none; padding:10px; }
.page.active { display:block; }
.card {
  background:white; padding:12px; margin:10px 0;
  border-radius:10px;
}
input, select, button {
  width:100%; padding:10px; margin:5px 0;
}
.flex { display:flex; gap:5px; }
</style>
</head>

<body>

<div id="loginBox" class="card">
  <button onclick="login()">Google 로그인</button>
</div>

<div id="app" style="display:none;">

<div class="tabs">
  <button onclick="tab(event,'players')" class="active">선수관리</button>
  <button onclick="tab(event,'game')">경기입력</button>
  <button onclick="tab(event,'rank')">랭킹</button>
</div>

<!-- 선수 관리 -->
<div id="players" class="page active">
  <div class="card">
    <h3>선수 추가</h3>
    <input id="newPlayer" placeholder="선수 이름">
    <button onclick="addPlayer()">추가</button>
  </div>
  <div id="playerList"></div>
</div>

<!-- 경기 입력 -->
<div id="game" class="page">
  <div class="card">
    <h3>경기 입력</h3>

    <input type="date" id="date">

    <select id="mode" onchange="updateUI()">
      <option value="1">1:1</option>
      <option value="2">2:2</option>
      <option value="3">3:3</option>
      <option value="4">4:4</option>
      <option value="43">4:3</option>
    </select>

    <div id="teamA"></div>
    <div id="teamB"></div>

    <select id="winner">
      <option value="A">A팀 승</option>
      <option value="B">B팀 승</option>
    </select>

    <button onclick="autoBalance()">자동 팀 밸런스</button>
    <button onclick="saveGame()">경기 저장</button>
  </div>
</div>

<!-- 랭킹 -->
<div id="rank" class="page"></div>

</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>

<script>

// Firebase
const firebaseConfig = {
  apiKey: "AIzaSyDKvEB_SrvDSADbqxX0LTgejksxtLt4G6U",
  authDomain: "starcraft-dashboard.firebaseapp.com",
  databaseURL: "https://starcraft-dashboard-default-rtdb.firebaseio.com/",
  projectId: "starcraft-dashboard"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();
const auth = firebase.auth();

// 로그인
function login(){
  const provider = new firebase.auth.GoogleAuthProvider();
  auth.signInWithRedirect(provider);
}

auth.onAuthStateChanged(user=>{
  if(user){
    loginBox.style.display="none";
    app.style.display="block";
  }
});

// 탭
function tab(e,id){
  document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
  document.getElementById(id).classList.add("active");
  document.querySelectorAll(".tabs button").forEach(b=>b.classList.remove("active"));
  e.target.classList.add("active");
}

// 선수 DB
let players=[];

db.ref("players").on("value",snap=>{
  players=[];
  snap.forEach(c=>players.push(c.val()));
  renderPlayers();
  updateUI();
});

function addPlayer(){
  let name=newPlayer.value.trim();
  if(!name) return;
  db.ref("players").push(name);
  newPlayer.value="";
}

function renderPlayers(){
  playerList.innerHTML = players.map(p=>`
    <div class="card">${p}</div>
  `).join("");
}

// 팀 UI
function updateUI(){
  let mode=modeSel();
  let [a,b]=mode;

  teamA.innerHTML="<b>A팀</b>";
  teamB.innerHTML="<b>B팀</b>";

  for(let i=0;i<a;i++) teamA.innerHTML+=selectHTML();
  for(let i=0;i<b;i++) teamB.innerHTML+=selectHTML();
}

function modeSel(){
  let m=document.getElementById("mode").value;
  if(m=="43") return [4,3];
  return [parseInt(m),parseInt(m)];
}

function selectHTML(){
  let html="<select>";
  players.forEach(p=> html+=`<option>${p}</option>`);
  html+="</select>";
  return html;
}

// 저장
function saveGame(){

  let teamA=[...document.querySelectorAll("#teamA select")].map(s=>s.value);
  let teamB=[...document.querySelectorAll("#teamB select")].map(s=>s.value);

  db.ref("games").push({
    date:date.value,
    teams:{A:teamA, B:teamB},
    winner:winner.value
  });
}

// MMR
function calcMMR(data){
  let mmr={};

  data.forEach(g=>{
    let all=[...g.teams.A,...g.teams.B];
    all.forEach(p=>{ if(!mmr[p]) mmr[p]=1000; });

    let SA=g.winner==="A"?1:0;
    let SB=1-SA;

    g.teams.A.forEach(p=>mmr[p]+=20*(SA-0.5));
    g.teams.B.forEach(p=>mmr[p]+=20*(SB-0.5));
  });

  return mmr;
}

// 랭킹
db.ref("games").on("value",snap=>{
  let data=[];
  snap.forEach(c=>data.push(c.val()));

  let mmr=calcMMR(data);

  let arr=Object.keys(mmr).map(p=>({p,mmr:mmr[p]}));
  arr.sort((a,b)=>b.mmr-a.mmr);

  rank.innerHTML = arr.map(x=>`
    <div class="card">${x.p} - ${x.mmr.toFixed(0)}</div>
  `).join("");
});

// 자동 밸런스
function autoBalance(){

  let all=[
    ...document.querySelectorAll("#teamA select"),
    ...document.querySelectorAll("#teamB select")
  ].map(s=>s.value);

  all=[...new Set(all)];
  all.sort(()=>Math.random()-0.5);

  let half=Math.ceil(all.length/2);

  let A=all.slice(0,half);
  let B=all.slice(half);

  document.querySelectorAll("#teamA select").forEach((s,i)=>s.value=A[i]||A[0]);
  document.querySelectorAll("#teamB select").forEach((s,i)=>s.value=B[i]||B[0]);
}

</script>

</body>
</html>
