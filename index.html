<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>스타 대시보드</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body { font-family: Arial; margin:0; background:#f2f2f2; }

.tabs { display:flex; background:#222; }
.tabs button {
  flex:1; padding:12px; color:white; background:#222; border:none;
}
.tabs button.active { background:#ff6600; }

.page { display:none; padding:10px; }
.page.active { display:block; }

.card {
  background:white; padding:12px; margin:10px 0;
  border-radius:10px;
}

button { padding:10px; width:100%; margin-top:5px; }
select,input { width:48%; padding:8px; margin:2px; }
.flex { display:flex; justify-content:space-between; }
</style>
</head>

<body>

<!-- 로그인 -->
<div id="loginBox" class="card">
  <button onclick="login()">Google 로그인</button>
</div>

<div id="app" style="display:none;">

<div class="tabs">
  <button onclick="showTab(event,'input')" class="active">입력</button>
  <button onclick="showTab(event,'dashboard')">대시보드</button>
  <button onclick="showTab(event,'player')">선수</button>
</div>

<!-- 입력 -->
<div id="input" class="page active">
  <div class="card">
    <h3>경기 입력</h3>

    <div class="flex">
      <select id="playerA1"></select>
      <select id="playerA2"></select>
    </div>

    <div class="flex">
      <select id="playerB1"></select>
      <select id="playerB2"></select>
    </div>

    <select id="winner">
      <option value="A">A팀 승</option>
      <option value="B">B팀 승</option>
    </select>

    <button onclick="autoBalance()">🤖 자동 팀 밸런스</button>
    <button onclick="saveGame()">경기 저장</button>
  </div>
</div>

<!-- 대시보드 -->
<div id="dashboard" class="page">
  <div id="rank"></div>
</div>

<!-- 선수 상세 -->
<div id="player" class="page">
  <div id="playerDetail"></div>
  <canvas id="chart"></canvas>
</div>

</div>

<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>

<script>

// Firebase 설정
const firebaseConfig = {
  apiKey: "AIzaSyDKvEB_SrvDSADbqxX0LTgejksxtLt4G6U",
  authDomain: "starcraft-dashboard.firebaseapp.com",
  databaseURL: "https://starcraft-dashboard-default-rtdb.firebaseio.com/",
  projectId: "starcraft-dashboard"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();
const auth = firebase.auth();


// 로그인
function login(){
  const provider = new firebase.auth.GoogleAuthProvider();
  auth.signInWithPopup(provider);
}

auth.onAuthStateChanged(user=>{
  if(user){
    loginBox.style.display="none";
    app.style.display="block";
  }
});


// 탭
function showTab(e,id){
  document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
  document.getElementById(id).classList.add("active");

  document.querySelectorAll(".tabs button").forEach(b=>b.classList.remove("active"));
  e.target.classList.add("active");
}


// 선수
let players=["상필","홍길동","김철수","이영희"];

function updateSelects(){
  ["playerA1","playerA2","playerB1","playerB2"].forEach(id=>{
    let el=document.getElementById(id);
    el.innerHTML="";
    players.forEach(p=>el.innerHTML+=`<option>${p}</option>`);
  });
}
updateSelects();


// 저장
function saveGame(){
  db.ref("games").push({
    date:new Date().toLocaleDateString(),
    games:[{
      teams:{
        A:[playerA1.value,playerA2.value],
        B:[playerB1.value,playerB2.value]
      },
      winner:winner.value
    }]
  });
}


// 데이터 로드
db.ref("games").on("value",snap=>{
  let data=[];
  snap.forEach(c=>{
    let v=c.val(); v.key=c.key;
    data.push(v);
  });
  render(data);
});


// MMR
function calcMMR(data){
  let mmr={};
  data.forEach(m=>{
    m.games.forEach(g=>{
      let all=[...g.teams.A,...g.teams.B];
      all.forEach(p=>{ if(!mmr[p]) mmr[p]=1000; });

      let SA=g.winner==="A"?1:0;
      let SB=1-SA;

      g.teams.A.forEach(p=>mmr[p]+=20*(SA-0.5));
      g.teams.B.forEach(p=>mmr[p]+=20*(SB-0.5));
    });
  });
  return mmr;
}


// 렌더
function render(data){

  window.lastData = data;

  let stats={}, history={};

  data.forEach(m=>{
    m.games.forEach(g=>{
      Object.keys(g.teams).forEach(t=>{
        g.teams[t].forEach(p=>{
          if(!stats[p]) stats[p]={win:0,lose:0};
          if(!history[p]) history[p]=[];

          if(g.winner===t){
            stats[p].win++; history[p].push(1);
          }else{
            stats[p].lose++; history[p].push(0);
          }
        });
      });
    });
  });

  let mmr=calcMMR(data);

  let arr=Object.keys(stats).map(p=>{
    let s=stats[p];
    return {p,...s,mmr:mmr[p]};
  });

  arr.sort((a,b)=>b.mmr-a.mmr);

  rank.innerHTML = arr.map(x=>`
    <div class="card" onclick="showPlayer('${x.p}')">
      ${x.p}<br>
      MMR ${x.mmr.toFixed(0)}<br>
      ${x.win}승 ${x.lose}패
    </div>
  `).join("");

  window.globalHistory = history;
}


// 자동 팀 밸런스
function autoBalance(){

  let players = [
    playerA1.value,
    playerA2.value,
    playerB1.value,
    playerB2.value
  ];

  players = [...new Set(players)];
  if(players.length<4){
    alert("서로 다른 4명 필요");
    return;
  }

  let mmr = calcMMR(window.lastData||[]);
  players.forEach(p=>{ if(!mmr[p]) mmr[p]=1000; });

  let comb = [
    [[players[0],players[1]],[players[2],players[3]]],
    [[players[0],players[2]],[players[1],players[3]]],
    [[players[0],players[3]],[players[1],players[2]]]
  ];

  let best, min=9999;

  comb.forEach(c=>{
    let A=c[0], B=c[1];
    let avgA=(mmr[A[0]]+mmr[A[1]])/2;
    let avgB=(mmr[B[0]]+mmr[B[1]])/2;
    let diff=Math.abs(avgA-avgB);

    if(diff<min){ min=diff; best=c; }
  });

  playerA1.value=best[0][0];
  playerA2.value=best[0][1];
  playerB1.value=best[1][0];
  playerB2.value=best[1][1];

  alert("MMR 차이: "+Math.round(min));
}


// 선수 상세
let chart;

function showPlayer(name){

  showTab({target:document.querySelectorAll(".tabs button")[2]},"player");

  let h = globalHistory[name]||[];

  playerDetail.innerHTML = `<div class="card"><h3>${name}</h3></div>`;

  let data = h.map((_,i)=>h.slice(0,i+1).reduce((a,b)=>a+b)/(i+1));

  if(chart) chart.destroy();

  chart = new Chart(document.getElementById("chart"),{
    type:"line",
    data:{
      labels:data.map((_,i)=>i+1),
      datasets:[{label:name,data}]
    }
  });
}

</script>

</body>
</html>
